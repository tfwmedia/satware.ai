site_name: 'satware® AI'
site_url: https://satware.ai/
site_author: satware AG
site_description: >-
  Entdecken Sie die KI-gestützten Lösungen von satware®. Innovative
  Automatisierung und maßgeschneiderte IT-Lösungen für Ihr Unternehmen.

use_directory_urls: false

copyright: Copyright &copy; 2025 satware AG

theme:
  name: material
  font: false
  custom_dir: overrides/
  language: de

  # Dark Mode als Standard (entsprechend satware CI)
  palette:
    scheme: slate
    primary: custom
    accent: custom

  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  #font:
  #  text: Roboto
  #  code: Roboto Mono

  favicon: assets/images/favicon.png
  logo: assets/images/logo.svg
  icon:
    logo: logo

plugins:
  - meta
  - exclude:
      glob:
        - "internal/*"
        - "templates/*"
  - blog:
      blog_dir: blog
      blog_toc: true
      post_url_format: "{slug}"
      post_date_format: "dd.MM.yyyy"
      archive_toc: true
      pagination: true
      archive: true
      authors: true
  - blog:
      blog_dir: workshops
      blog_toc: false
      post_url_format: "{slug}"
      post_date_format: "dd.MM.yyyy"
      archive: false
      pagination: false
      categories: true
      categories_toc: true
  - search
  - redirects:
